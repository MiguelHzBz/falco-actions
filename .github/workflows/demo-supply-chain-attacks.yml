name: "Supply Chain Attack Detection Framework"

# Demonstrates Falco runtime detection of real-world supply chain attack patterns.
# Each scenario is self-contained: threat-profile.yaml + rules.yaml + simulate.sh.
# Adding a new attack requires only creating a new demos/<scenario>/ directory.
#
# See demos/README.md for how to add scenarios.

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Attack scenario to simulate"
        type: choice
        default: all
        options:
          - all
          - teampcp-trivy
          - teampcp-pypi
          - teampcp-canisterworm

jobs:
  # Discovers which scenarios to run based on workflow input or directory listing.
  discover:
    name: "Discover Scenarios"
    runs-on: ubuntu-latest
    outputs:
      scenarios: ${{ steps.list.outputs.scenarios }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: List scenarios
        id: list
        run: |
          if [ "${{ inputs.scenario }}" = "all" ]; then
            scenarios=$(
              ls demos/ \
              | grep -v README.md \
              | grep -v '^\.' \
              | jq -R -s -c 'split("\n") | map(select(length > 0))'
            )
          else
            scenarios='["${{ inputs.scenario }}"]'
          fi
          echo "Running scenarios: $scenarios"
          echo "scenarios=$scenarios" >> "$GITHUB_OUTPUT"

  # Runs each scenario simulation under Falco capture (analyze mode).
  # One parallel job per scenario; all use the same workflow pattern.
  simulate:
    name: "[${{ matrix.scenario }}] Attack Simulation"
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJson(needs.discover.outputs.scenarios) }}
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      # Start sysdig capture (analyze mode). Scenario-specific Falco rules are
      # applied during the analyze job when replaying the scap file — not here.
      - name: Start Falco
        uses: falcosecurity/falco-actions/start@ddcff83af077b30af70f188ba7b5446c98041446
        with:
          mode: analyze
          verbose: true

      - name: "[Attack] Run ${{ matrix.scenario }} simulation"
        run: |
          echo "::group::Threat Profile"
          cat demos/${{ matrix.scenario }}/threat-profile.yaml
          echo "::endgroup::"
          echo ""
          bash demos/${{ matrix.scenario }}/simulate.sh

      - name: Stop Falco
        if: always()
        uses: ./stop
        with:
          mode: analyze
          scenario: ${{ matrix.scenario }}
          verbose: true

  # Runs forensic analysis on each scenario's scap capture.
  # Produces a per-scenario report with Falco alerts, connections, processes,
  # written files, hashes, and an OpenAI narrative mapping each alert to the kill chain.
  analyze:
    name: "[${{ matrix.scenario }}] Forensic Analysis"
    needs: [discover, simulate]
    runs-on: ubuntu-latest
    if: always()
    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJson(needs.discover.outputs.scenarios) }}
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Read scenario summary
        id: meta
        run: |
          summary=$(grep -A2 "^summary:" demos/${{ matrix.scenario }}/threat-profile.yaml \
                    | tail -1 | sed 's/^[ >]*//' | head -c 300)
          echo "summary=$summary" >> "$GITHUB_OUTPUT"

      - name: Analyze ${{ matrix.scenario }} attack capture
        uses: ./analyze
        with:
          falco-version: "0.39.0"
          scenario: ${{ matrix.scenario }}
          custom-rule-file: "${{ github.workspace }}/demos/${{ matrix.scenario }}/rules.yaml"
          extract-connections: true
          extract-processes: true
          extract-dns: true
          extract-containers: true
          extract-written-files: true
          extract-hashes: true
          openai-user-prompt: >
            This is a controlled Falco detection demo for the scenario: ${{ matrix.scenario }}.
            ${{ steps.meta.outputs.summary }}
            For each Falco alert triggered, identify: (1) which stage of the attack kill chain
            it corresponds to, (2) what the attacker was doing at that moment, (3) whether
            this behavior would be visible to static analysis or only to runtime detection,
            and (4) the recommended defensive action. Be specific about the MITRE ATT&CK
            technique. Keep the response concise — one short paragraph per alert.
          openai-model: "gpt-4o"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
